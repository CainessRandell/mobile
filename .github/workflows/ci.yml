name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_android_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    environment: secrets
    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Configurar Expo e EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validar EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN não foi carregado"
            exit 1
          fi
          echo "EXPO_TOKEN carregado com sucesso"

      - name: Validar autenticação EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Gerar APK Android com EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Obter URL do APK gerado
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const builds = JSON.parse(data); console.log(builds[0].artifacts.buildUrl); })")
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "APK gerado em: $BUILD_URL"

      - name: Baixar APK
        run: |
          mkdir -p ../output
          curl -L "$BUILD_URL" -o ../output/app-${{ github.sha }}.apk

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: apk-android-${{ github.ref_name }}
          path: output/*.apk
          retention-days: 30
